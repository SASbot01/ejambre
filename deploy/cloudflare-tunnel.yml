# ============================================
# CLOUDFLARE TUNNEL CONFIG
# ============================================
# Copia este archivo a ~/.cloudflared/config.yml
# y reemplaza TUNNEL_ID con tu ID real
#
# Pasos:
#   1. cloudflared tunnel create enjambre
#   2. Copia el TUNNEL_ID
#   3. cloudflared tunnel route dns enjambre comando.blackwolfsec.io
#   4. cloudflared tunnel route dns enjambre api-enjambre.blackwolfsec.io
#   5. cloudflared tunnel route dns enjambre forms.blackwolfsec.io
#   6. cloudflared tunnel route dns enjambre soc.blackwolfsec.io
#   7. cloudflared tunnel run enjambre

tunnel: TUNNEL_ID
credentials-file: /root/.cloudflared/TUNNEL_ID.json

ingress:
  - hostname: comando.blackwolfsec.io
    service: http://localhost:80

  - hostname: api-enjambre.blackwolfsec.io
    service: http://localhost:80

  - hostname: forms.blackwolfsec.io
    service: http://localhost:80

  - hostname: soc.blackwolfsec.io
    service: http://localhost:80

  # Catch-all (requerido por Cloudflare)
  - service: http_status:404
