# ============================================
# ENJAMBRE BLACKWOLF - NGINX CONFIG
# ============================================
# Cloudflare Tunnel se conecta al puerto 80
# Los subdominios se resuelven por Host header

# Centro de Comando
server {
    listen 80;
    server_name comando.blackwolfsec.io;

    location / {
        proxy_pass http://enjambre-dashboard:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Enjambre API
server {
    listen 80;
    server_name api-enjambre.blackwolfsec.io;

    client_max_body_size 10M;

    location / {
        proxy_pass http://enjambre-api:3500;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSE - Event Stream
    location /api/events/stream {
        proxy_pass http://enjambre-api:3500;
        proxy_set_header Host $host;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }
}

# BlackWolf SOC
server {
    listen 80;
    server_name soc.blackwolfsec.io;

    location / {
        proxy_pass http://soc-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Webhook receiver para forms (público)
server {
    listen 80;
    server_name forms.blackwolfsec.io;

    client_max_body_size 5M;

    # Solo permite POST a /webhook
    location /webhook {
        limit_except POST {
            deny all;
        }
        proxy_pass http://enjambre-api:3500/api/forms/webhook;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # CORS para los forms embebidos
    location / {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type';
            add_header 'Access-Control-Max-Age' 86400;
            return 204;
        }
        return 404;
    }
}
