# ============================================
# ENJAMBRE BLACKWOLF - NGINX CONFIG
# ============================================
# Cloudflare Tunnel se conecta al puerto 80
# Los subdominios se resuelven por Host header
#
# Security headers globales (aplican a todos los servers)
# - HSTS: 1 año + preload (Cloudflare ya fuerza HTTPS pero reforzamos)
# - X-Frame-Options: evita clickjacking
# - X-Content-Type-Options: evita MIME sniffing
# - Referrer-Policy: no filtrar URLs a 3rd parties
# - Permissions-Policy: restringe APIs sensibles del navegador

# ------------------------------------------------------------
# Rate-limit zones (shared memory)
# ------------------------------------------------------------
limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api_webhook:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=api_login:10m rate=1r/s;

# ------------------------------------------------------------
# Centro de Comando
# ------------------------------------------------------------
server {
    listen 80;
    server_name comando.blackwolfsec.io;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # CSP permisivo (React + Supabase + Anthropic + fonts). Endurecer cuando se consolide.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: blob: https:; font-src 'self' data: https:; connect-src 'self' https: wss:; frame-ancestors 'self';" always;

    location / {
        proxy_pass http://enjambre-dashboard:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ------------------------------------------------------------
# Enjambre API
# ------------------------------------------------------------
server {
    listen 80;
    server_name api-enjambre.blackwolfsec.io;

    client_max_body_size 10M;

    # Security headers (APIs también — defense in depth)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    # Rate limit general
    limit_req zone=api_general burst=60 nodelay;
    limit_req_status 429;

    location / {
        proxy_pass http://enjambre-api:3500;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSE - Event Stream (sin rate-limit: conexiones persistentes)
    location /api/events/stream {
        proxy_pass http://enjambre-api:3500;
        proxy_set_header Host $host;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    # Webhooks entrantes (Stripe, ManyChat, Meta): rate-limit más estricto
    location /api/webhooks/ {
        limit_req zone=api_webhook burst=20 nodelay;
        proxy_pass http://enjambre-api:3500;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Login (anti brute-force adicional al rate-limit de app)
    location /api/auth/login {
        limit_req zone=api_login burst=5 nodelay;
        proxy_pass http://enjambre-api:3500;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ------------------------------------------------------------
# BlackWolf SOC
# ------------------------------------------------------------
server {
    listen 80;
    server_name soc.blackwolfsec.io;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://soc-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ------------------------------------------------------------
# Webhook receiver para forms (público)
# ------------------------------------------------------------
server {
    listen 80;
    server_name forms.blackwolfsec.io;

    client_max_body_size 5M;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # Rate-limit forms (anti spam)
    limit_req zone=api_webhook burst=10 nodelay;

    # Solo permite POST a /webhook
    location /webhook {
        limit_except POST OPTIONS {
            deny all;
        }
        proxy_pass http://enjambre-api:3500/api/forms/webhook;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # CORS para los forms embebidos (sigue abierto — son forms públicos por naturaleza)
    location / {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type';
            add_header 'Access-Control-Max-Age' 86400;
            return 204;
        }
        return 404;
    }
}
