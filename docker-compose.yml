version: "3.9"

services:
  # ============================================
  # BASES DE DATOS
  # ============================================
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-enjambre}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-enjambre}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-enjambre}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - enjambre


  # ============================================
  # ENJAMBRE API (Cerebro)
  # ============================================
  enjambre-api:
    build:
      context: ./enjambre-api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3500
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-3-haiku-20240307}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-enjambre}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-enjambre}
      # SOC
      - SOC_API_URL=${SOC_API_URL}
      - SOC_USERNAME=${SOC_USERNAME}
      - SOC_PASSWORD=${SOC_PASSWORD}
      - SOC_COMPANY_DOMAIN=${SOC_COMPANY_DOMAIN:-blackwolfsec.io}
      # Supabase
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - DCC_SUPABASE_URL=${DCC_SUPABASE_URL}
      - DCC_SUPABASE_KEY=${DCC_SUPABASE_KEY}
      # Auth
      - JWT_SECRET=${JWT_SECRET}
      # Email
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM:-BlackWolf <noreply@blackwolfsec.io>}
      # Discord
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_CHANNEL_IDS=${DISCORD_CHANNEL_IDS}
      - DISCORD_ADMIN_ROLE=${DISCORD_ADMIN_ROLE:-enjambre-admin}
      # WhatsApp
      - WA_PHONE_NUMBER_ID=${WA_PHONE_NUMBER_ID}
      - WA_ACCESS_TOKEN=${WA_ACCESS_TOKEN}
      - WA_VERIFY_TOKEN=${WA_VERIFY_TOKEN:-enjambre-verify-2026}
      - WA_ALLOWED_NUMBERS=${WA_ALLOWED_NUMBERS}
    expose:
      - "3500"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - enjambre

  # ============================================
  # ENJAMBRE DASHBOARD (Centro de Comando)
  # Tunnel de Cloudflare apunta a localhost:3500
  # Dashboard sirve frontend + proxy /api → enjambre-api
  # ============================================
  enjambre-dashboard:
    build:
      context: ./enjambre-dashboard
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3500:80"
    depends_on:
      - enjambre-api
    networks:
      - enjambre

  # ============================================
  # CLOUDFLARE TUNNEL
  # Gestionado por systemd (cloudflared-enjambre.service)
  # ============================================

volumes:
  postgres_data:

networks:
  enjambre:
    driver: bridge
